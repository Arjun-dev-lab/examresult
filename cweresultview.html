<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Student Result</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Student Result</h2>

    <div class="form-group">
        <select id="subject">
            <option value="chemistry">Chemistry</option>
            <option value="botany">Botany</option>
        </select>
    </div>

    <div class="form-group">
        <input type="text" id="roll" placeholder="Enter Roll No">
    </div>

    <button onclick="findStudent()">Search</button>

    <pre id="result"></pre>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
let chemData = [];
let botData = [];

// Load Chemistry
fetch("chemistry.xlsx")
.then(res => res.arrayBuffer())
.then(buffer => {
    const wb = XLSX.read(buffer, { type: "array" });
    chemData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
});

// Load Botany
fetch("botany.xlsx")
.then(res => res.arrayBuffer())
.then(buffer => {
    const wb = XLSX.read(buffer, { type: "array" });
    botData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
});

// SEARCH FUNCTION
function findStudent() {
    const subject = document.getElementById("subject").value;
    const roll = document.getElementById("roll").value.trim();

    let dataset = [];

    if(subject === "chemistry"){
        dataset = chemData;
    } else if(subject === "botany"){
        dataset = botData;
    }

    const student = dataset.find(s => 
        String(s["Roll No"] || s["ROLL NO"]) === roll
    );

    if(!student){
        document.getElementById("result").textContent = "Student not found ❌";
        return;
    }

    const name = student["Name"] || student["NAME"] || "";
    const marks = student["Marks"] || student["Total"] || "";
    const percent = student["%"] || student["PERCENTAGE"] || "";
    const rank = student["Rank"] || student["RANK"] || "";

    const text =
`${subject.toUpperCase()} RESULT

Name: ${name}
Roll No: ${roll}
Marks: ${marks}
Percentage: ${percent}
Rank: ${rank}`;

    document.getElementById("result").textContent = text;
}
</script>

</body>
</html>
